name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Protocol Buffers compiler
        uses: arduino/setup-protoc@v3

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-validate"
          cache-targets: false

      - name: Format Check
        run: cargo fmt --all -- --check

      - name: Clippy Lint
        run: cargo clippy --features "grpc,cli,auth,onnx,db,redis,openapi,mcp" --all-targets -- -D warnings

      - name: Cargo Audit
        run: cargo audit

      - name: Build Check
        run: cargo build --features "grpc,cli,auth,onnx,db,redis,openapi,mcp"

      - name: Run Tests
        run: cargo test --features "grpc,cli,auth,onnx,db,redis,openapi,mcp" --lib

  build-release:
    name: Build Release Binaries
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13, macos-14]
        include:
          - os: ubuntu-latest
            artifact_name: vecboost
            asset_name: vecboost-linux-x86_64
            ext: ""
            features: "grpc,cli,auth,onnx,db,redis,openapi,mcp"
            continue_on_error: false
          - os: windows-latest
            artifact_name: vecboost.exe
            asset_name: vecboost-windows-x86_64.exe
            ext: ".exe"
            features: "grpc,cli,auth,onnx,db,redis,openapi,mcp"
            continue_on_error: false
          - os: macos-13
            artifact_name: vecboost
            asset_name: vecboost-macos-x86_64
            ext: ""
            features: "grpc,cli,auth,onnx,db,redis,openapi,mcp"
            continue_on_error: true
          - os: macos-14
            artifact_name: vecboost
            asset_name: vecboost-macos-arm64
            ext: ""
            features: "grpc,cli,auth,onnx,db,redis,openapi,mcp"
            continue_on_error: true

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    continue-on-error: ${{ matrix.continue_on_error }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Protocol Buffers compiler
        uses: arduino/setup-protoc@v3

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-${{ matrix.os }}"
          cache-targets: false

      - name: Build Release
        run: cargo build --release --features "${{ matrix.features }}"

      - name: Create Artifact
        run: |
          mkdir -p release
          cp target/release/${{ matrix.artifact_name }} release/${{ matrix.asset_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: release/${{ matrix.asset_name }}
          compression-level: 9
          retention-days: 30

  build-docker:
    name: Build Docker Image
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: vecboost/vecboost
          tags: |
            type=semver,pattern=v{{version}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64

  github-release:
    name: Create GitHub Release
    needs: [build-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare Release Assets
        run: |
          ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          name: Release v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    needs: [github-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Protocol Buffers compiler
        uses: arduino/setup-protoc@v3

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-publish"
          cache-targets: false

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  notify:
    name: Notify Status
    needs: [build-release, build-docker, github-release, publish-crates]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    steps:
      - name: Check status
        run: |
          echo "build-release: ${{ needs.build-release.result }}"
          echo "build-docker: ${{ needs.build-docker.result }}"
          echo "github-release: ${{ needs.github-release.result }}"
          echo "publish-crates: ${{ needs.publish-crates.result }}"
          if [[ "${{ needs.build-release.result }}" == "success" ]] && \
             [[ "${{ needs.github-release.result }}" == "success" ]] && \
             [[ "${{ needs.publish-crates.result }}" == "success" ]]; then
            echo "✅ Release completed successfully!"
            if [[ "${{ needs.build-docker.result }}" != "success" ]]; then
              echo "⚠️  Docker image build failed (non-blocking)"
            fi
            exit 0
          else
            echo "❌ Release failed!"
            exit 1
          fi
